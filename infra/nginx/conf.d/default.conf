# Redirection HTTP -> HTTPS. Dev : HTTPS publié sur le port hôte 8453.
server {
    listen 80;
    server_name _;
    return 301 https://$host:8453$request_uri;
}

server {
    listen 443 ssl;
    http2 on;
    server_name _;

    ssl_certificate /etc/nginx/certs/dsi360.crt;
    ssl_certificate_key /etc/nginx/certs/dsi360.key;
    ssl_protocols TLSv1.2 TLSv1.3;

    # API
    location /api/ {
        proxy_pass http://api:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Frontend (image self-contained servie sur :80).
    location / {
        proxy_pass http://frontend:80;
        proxy_set_header Host $host;
    }
}
