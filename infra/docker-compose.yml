# DSI 360 — stack de dev. Ports hôte décalés pour cohabiter avec d'autres projets (ex. DORIS).
# App : https://localhost:8453 — API debug : 127.0.0.1:8011 — Vite dev : 5290.
services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes: [pgdata:/var/lib/postgresql/data]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    build: ../backend
    env_file: env/.env
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }
    ports:
      - "127.0.0.1:8011:8000" # API en local (debug)
    volumes:
      - ../backend/src:/app/src:ro # dev : code monté (install éditable)
      - ../backend/pyproject.toml:/app/pyproject.toml:ro # config lint/types à jour
      - ../db:/db:ro

  worker:
    build: ../backend
    command: celery -A dsi360.infrastructure.tasks.app worker -l info
    env_file: env/.env
    depends_on:
      redis: { condition: service_healthy }
    volumes: [../backend/src:/app/src:ro]
    profiles: ["full"] # activé quand les tâches Celery existeront

  scheduler:
    build: ../backend
    command: celery -A dsi360.infrastructure.tasks.app beat -l info
    env_file: env/.env
    depends_on:
      redis: { condition: service_healthy }
    volumes: [../backend/src:/app/src:ro]
    profiles: ["full"]

  frontend:
    build: ../frontend
    profiles: ["full"] # build statique servi par nginx

  nginx:
    image: nginx:1.27-alpine
    depends_on: [api]
    ports:
      - "8453:443"
      - "8090:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./nginx/certs:/etc/nginx/certs:ro

volumes:
  pgdata:
